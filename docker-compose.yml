services:
  createfixture:
    build: .
    container_name: createfixture-app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      CHOKIDAR_USEPOLLING: "true"
      BROWSER: "none"
      EXPO_NO_TELEMETRY: "1"
    stdin_open: true
    tty: true
    command: npx expo start --web --host lan --clear
